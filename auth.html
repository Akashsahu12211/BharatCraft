<div class="auth-container d-flex">
  <!-- Left Side: Image / Branding -->
  <div class="auth-hero hidden-mobile">
    <div class="auth-hero-overlay"></div>
    <div class="auth-hero-content">
      <h1 class="logo-text">Bharat<span class="logo-accent" style="color: var(--accent);">Craft</span></h1>
      <h2>Connecting India's Heritage with the World</h2>
      <p>Join our community to discover authentic handcrafted treasures or showcase your craft globally.</p>
    </div>
  </div>

  <!-- Right Side: Auth Forms -->
  <div class="auth-form-wrapper">
    <div class="auth-card">
      
      <!-- Primary Tabs -->
      <div class="auth-tabs" id="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
        <div class="auth-tab-slider" id="auth-tab-slider"></div>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label style="margin:0;">Password</label>
            <a href="#" id="link-forgot-pwd" class="forgot-link">Forgot Password?</a>
          </div>
          <input type="password" id="login-pwd" placeholder="Enter your password" required>
          <span class="error-msg"></span>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="btn-login">
          <span class="btn-text">Sign In</span>
        </button>
        <div class="auth-divider"><span>OR</span></div>
        <button type="button" class="btn btn-outline google-btn w-100 google-auth-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          <span class="btn-text">Sign in with Google</span>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" class="auth-form">
        <!-- Role Selection Cards -->
        <label class="mb-2 d-block">I want to join as a:</label>
        <div class="role-selector d-flex gap-2 mb-3">
          <label class="role-card flex-1">
            <input type="radio" name="role" value="customer" checked>
            <div class="role-card-inner">
              <span class="role-icon">🛍️</span>
              <span class="role-name">Customer</span>
            </div>
          </label>
          <label class="role-card flex-1">
            <input type="radio" name="role" value="artisan">
            <div class="role-card-inner">
              <span class="role-icon">🎨</span>
              <span class="role-name">Artisan</span>
            </div>
          </label>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="E.g. Rajesh Kumar" required minlength="2">
          <span class="error-msg"></span>
        </div>
        
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required>
          <span class="error-msg"></span>
        </div>

        <div class="form-group">
          <label>Phone Number (Optional)</label>
          <input type="tel" id="reg-phone" placeholder="10-digit mobile number">
          <span class="error-msg"></span>
        </div>

        <!-- Artisan Extra Fields (Hidden by default) -->
        <div id="artisan-fields" style="display: none;">
          <div class="form-group">
            <label>Craft Type</label>
            <select id="reg-craft">
              <option value="">Select your primary craft</option>
              <option value="Pottery">Pottery & Ceramics</option>
              <option value="Textiles">Textiles & Weaving</option>
              <option value="Jewelry">Jewelry Making</option>
              <option value="Woodwork">Woodwork & Carving</option>
              <option value="Painting">Painting & Folk Art</option>
              <option value="Metal">Metal Casting (Dhokra/Bidri)</option>
              <option value="Leather">Leather Craft</option>
              <option value="Bamboo">Bamboo & Cane</option>
              <option value="Stone">Stone Carving</option>
              <option value="Grass">Grass & Cane Weaving</option>
              <option value="Other">Other Craft</option>
            </select>
            <span class="error-msg"></span>
          </div>
          <div class="d-flex gap-2">
            <div class="form-group flex-1">
              <label>City</label>
              <input type="text" id="reg-city" placeholder="e.g. Jaipur">
              <span class="error-msg"></span>
            </div>
            <div class="form-group flex-1">
              <label>State</label>
              <input type="text" id="reg-state" placeholder="e.g. Rajasthan">
              <span class="error-msg"></span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pwd" placeholder="Create a strong password" required minlength="6">
          <div class="pwd-strength" id="pwd-strength"><div class="pwd-strength-bar" id="pwd-strength-bar"></div></div>
          <span class="error-msg"></span>
        </div>
        
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-pwd-confirm" placeholder="Repeat your password" required minlength="6">
          <span class="error-msg"></span>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="btn-register">
          <span class="btn-text">Create Account</span>
        </button>
        <div class="auth-divider"><span>OR</span></div>
        <button type="button" class="btn btn-outline google-btn w-100 google-auth-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          <span class="btn-text">Sign up with Google</span>
        </button>
      </form>
      
      <!-- FORGOT PASSWORD FORM -->
      <form id="forgot-form" class="auth-form" style="display:none;">
        <h3 style="margin-bottom: 0.5rem;">Reset Password</h3>
        <p class="mb-3 text-muted" style="font-size: 0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="forgot-email" placeholder="you@example.com" required>
          <span class="error-msg"></span>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3" id="btn-forgot">
          <span class="btn-text">Send Reset Link</span>
        </button>
        <div class="text-center" style="text-align: center;">
          <a href="#" id="link-back-login" class="forgot-link" style="color:var(--text-secondary);">← Back to Login</a>
        </div>
      </form>

    </div>
  </div>
</div>
